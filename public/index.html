<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Heru Rusdianto">

    <link rel="stylesheet" href="style.css">

    <link rel="apple-touch-icon" sizes="57x57" href="icons/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="icons/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="icons/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="icons/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="icons/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icons/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">

    <meta name="description" content="CSV To JSON Tool"/>
    <meta name="theme-color" content="#5755d9"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="CSV To JSON"/>
    <meta name="msapplication-TileColor" content="#5755d9">
    <meta name="msapplication-TileImage" content="icons/ms-icon-144x144.png">

    <title>CSV To JSON</title>
</head>
<body>
    <div class="container wide-container">
        <div class="topbar">
            <a href="https://github.com/herusdianto/newline-joiner" class="github-link" target="_blank" rel="noopener noreferrer" title="GitHub Repository">
                <svg class="github-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.48 2 2 6.58 2 12.26c0 4.5 2.87 8.32 6.84 9.67.5.09.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.62-3.37-1.36-3.37-1.36-.45-1.18-1.1-1.5-1.1-1.5-.9-.63.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05A9.36 9.36 0 0112 7.07c.85.004 1.71.12 2.51.35 1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.07.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.58.69.48A10.01 10.01 0 0022 12.26C22 6.58 17.52 2 12 2z" fill="currentColor"/>
                </svg>
            </a>
            <div class="theme-toggle">
                <button id="theme-switch" aria-label="Toggle dark/light mode" class="theme-toggle-btn">
                    <span id="theme-icon"></span>
                </button>
            </div>
        </div>
        <section class="hero hero-sm bg-primary">
            <div class="hero-body">
                <h1>CSV To JSON</h1>
                <p>CSV To JSON Converter Tool</p>
                <p class="client-side-note">⚡ <strong>100% Client-side:</strong> All processing is done in your browser. <u>No data is sent to any server.</u></p>
            </div>
        </section>

        <form>
            <div class="form-group">
                <label class="form-label" for="input">Input</label>
                <div class="control">
                    <textarea class="form-input" placeholder="Type the input" id="input" rows="20"></textarea>
                </div>
            </div>

            <div class="form-group form-inline" style="margin-bottom: 1.2rem;">
                <div class="separator-group">
                    <label class="form-label" for="delimiter">CSV Delimiter</label>
                    <input class="form-input" placeholder="Type the csv delimiter" id="delimiter" value=",">
                </div>
                <div class="quotes-group">
                    <label class="form-label" for="format">Format</label>
                    <select class="form-input" id="format" name="format">
                        <option value="minified">Minified</option>
                        <option value="pretty">Pretty</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="output">Output</label>
                <div class="control">
                    <textarea class="form-input" placeholder="The output" id="output" rows="20"></textarea>
                </div>
            </div>

            <div class="btn-group btn-group-block">
                <button class="btn btn-lg" type="button" onclick="copy()" id="copyButton">Copy</button>
            </div>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
